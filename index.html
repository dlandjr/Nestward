<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Growth Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
  <div class="app-header">
    <h1>Savings growth calculator</h1>
    <p class="app-subtitle">Model multiple accounts, tax treatment, salary growth, and investment scenarios over time.</p>
  </div>

  <div class="cw">
    <div class="slabel" style="margin-top:0">Global inputs</div>
    <div class="fg">
      <div class="fi"><label>Current year</label><input type="number" id="gStartYear" value="2025" min="2000" max="2100" step="1"></div>
      <div class="fi"><label>Current salary ($)</label><input type="number" id="gSalary" value="75000" min="0" step="1000"></div>
      <div class="fi"><label>Annual raise (%)</label><input type="number" id="gRaise" value="3" min="0" max="30" step="0.5"><span class="hint">Until peak salary year</span></div>
      <div class="fi"><label>Annual bonus (%)</label><input type="number" id="gBonus" value="0" min="0" max="100" step="1"><span class="hint">% of salary</span></div>
      <div class="fi"><label>Time span (years)</label><input type="number" id="gYears" value="30" min="1" max="60" step="1"></div>
      <div class="fi"><label>Peak salary year</label><input type="number" id="gPeak" value="2045" min="2000" max="2100" step="1"><span class="hint">After peak, raises match 2.5% inflation</span></div>
    </div>

    <div class="slabel">Tax settings</div>
    <div class="fg">
      <div class="fi"><label>State</label><select id="gState"></select></div>
      <div class="fi"><label>Filing status</label>
        <select id="gFiling">
          <option value="single">Single</option>
          <option value="married">Married filing jointly</option>
        </select>
      </div>
    </div>
    <div class="tax-info" id="taxInfo"></div>

    <hr class="divider">

    <div style="display:flex;align-items:flex-end;gap:8px">
      <div class="acct-tabs" id="acctTabs" style="flex:1"></div>
      <button class="tbtn" onclick="addAccount()" style="color:#185FA5;border-color:#185FA5;margin-bottom:1px">+ Account</button>
    </div>
    <div id="acctPanels"></div>
  </div>

  <script src="data.js"></script>
  <script src="calculator.js"></script>
  <script src="ui.js"></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
